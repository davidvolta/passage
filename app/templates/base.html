<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Osho Says{% endblock %}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Georgia, serif; background: #faf9f7; color: #2a2a2a; max-width: 720px; margin: 0 auto; padding: 0 20px; }
  .tab-bar { display: flex; border-bottom: 1px solid #e8e6e3; padding-top: 20px; position: sticky; top: 0; background: #faf9f7; z-index: 100; }
  .tab { padding: 12px 20px; font-size: 0.95rem; color: #888; text-decoration: none; font-family: inherit; border-bottom: 2px solid transparent; transition: color 0.15s; }
  .tab-fav { margin-left: auto; font-size: 1.2rem; padding: 10px 20px; -webkit-text-stroke: 1px currentColor; }
  .tab:hover { color: #2a2a2a; }
  .tab.active { color: #2a2a2a; border-bottom-color: #2a2a2a; }
  {% block styles %}{% endblock %}
</style>
</head>
<body>

<nav class="tab-bar">
  <a href="/" class="tab {% if active_tab == 'home' %}active{% endif %}">Home</a>
  <a href="/passages" class="tab {% if active_tab == 'passages' %}active{% endif %}">Passages</a>
  <a href="/channel" class="tab {% if active_tab == 'channel' %}active{% endif %}">Channel</a>
  <a href="/favorites" class="tab tab-fav {% if active_tab == 'favorites' %}active{% endif %}" aria-label="Favorites">&#9825;</a>
</nav>

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}

</body>
</html>
