<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Osho Says{% endblock %}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Georgia, serif; background: #1a1a1a; color: #f0ead8; max-width: 720px; margin: 0 auto; padding: 0 20px; }
  .tab-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2e2e2e; padding-top: 20px; position: sticky; top: 0; background: #1a1a1a; z-index: 100; }
  .tab { padding: 12px 20px; font-size: 0.95rem; color: #6a6460; text-decoration: none; font-family: inherit; border-bottom: 2px solid transparent; transition: color 0.15s; }
  .tab-home { font-size: 1.3rem; padding: 10px 20px; display: flex; align-items: center; }
  .tab-home .nav-icon { width: 20px; height: 20px; object-fit: contain; }
  .tab-center { display: flex; justify-content: center; flex: 1; }
  .tab-fav { font-size: 1.2rem; padding: 10px 20px; -webkit-text-stroke: 1px currentColor; }
  .tab:hover { color: #f0ead8; }
  .tab.active { color: #f0ead8; border-bottom-color: #c9a96e; }

  /* Lightbox */
  #lb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; overflow-y: auto; padding: 40px 20px; }
  #lb-card { background: #252525; border-radius: 8px; padding: 32px; max-width: 680px; margin: 0 auto; border: 1px solid #333; }
  #lb-text { font-size: 1rem; line-height: 1.85; margin-bottom: 20px; color: #f0ead8; }
  #lb-text p { margin-bottom: 1.2em; }
  #lb-text p:last-child { margin-bottom: 0; }
  #lb-text p.lb-highlight { background: rgba(201,169,110,0.15); border-radius: 3px; padding: 2px 4px; margin-left: -4px; }
  #lb-meta { font-size: 0.85rem; color: #6a6460; font-style: italic; }

  {% block styles %}{% endblock %}
</style>
</head>
<body>

<nav class="tab-bar">
  <a href="/" class="tab tab-home {% if active_tab == 'home' %}active{% endif %}" aria-label="Home">&#9775;</a>
  <div class="tab-center">
    <a href="/passages" class="tab {% if active_tab == 'passages' %}active{% endif %}">Passages</a>
    <a href="/channel" class="tab {% if active_tab == 'channel' %}active{% endif %}">Channel</a>
  </div>
  <a href="/favorites" class="tab tab-fav {% if active_tab == 'favorites' %}active{% endif %}" aria-label="Favorites">&#9825;</a>
</nav>

<div id="lb-overlay" onclick="closeLightbox()">
  <div id="lb-card" onclick="event.stopPropagation()">
    <div id="lb-text"></div>
    <div id="lb-meta"><span id="lb-book"></span></div>
  </div>
</div>

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}

<script>
function _lbEsc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function openLightbox(chunkId) {
  if (!window._lightboxGetPassage) return;
  const p = window._lightboxGetPassage(chunkId);
  if (!p) return;

  // Get the preview paragraph stored on the card
  const card = document.querySelector(`.passage[data-id="${chunkId}"]`);
  const preview = card ? card.dataset.preview : '';

  // Render paragraphs, highlighting the one that was shown in the card
  const paras = p.text.replace(/^#+\s*/gm, '').split('\n\n').map(s => s.trim()).filter(s => s);
  document.getElementById('lb-text').innerHTML = paras.map(para =>
    `<p class="${preview && para === preview ? 'lb-highlight' : ''}">${_lbEsc(para)}</p>`
  ).join('');

  document.getElementById('lb-book').textContent = p.bookTitle;
  document.getElementById('lb-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lb-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
